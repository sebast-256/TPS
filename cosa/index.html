    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <button id="toggleTheme">Cambiar Modo</button>

    <style>
    body { transition: 0.3s; }
    .dark-mode { background-color: #222; color: #ffffff; }
    </style>

    <script>
    const btnTheme = document.getElementById('toggleTheme');
    btnTheme.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
    });
    </script>

        <div class="card">
    <img style = "width: 200px;" src="mandarin_PNG13.png" alt="Producto">
    <h3>Mandarina</h3>
    <p class="price">$1.000</p>
    <button>Añadir al carrito</button>
    </div>

    <style>
    .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
        width: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: sans-serif;
    }
    button {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        border-radius: 4px;
    }
    </style>

    </div>
    </body>
    </html>
